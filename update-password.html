<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Password – Rise & Run TT</title>
  <meta name="description" content="Set a new password for your Rise & Run TT account.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a0000">
  <style>
    .auth-hero { background: linear-gradient(135deg, #1a0000 0%, #4a0000 50%, #8b0000 100%); padding: 60px 0 40px; text-align: center; color: var(--white); border-radius: 0 0 40px 40px; }
    .auth-hero h1 { font-size: 2rem; font-weight: 900; }
    .auth-hero h1 span { color: var(--accent); }
    .auth-section { padding: 40px 0 60px; }
    .auth-container { max-width: 460px; margin: 0 auto; padding: 0 20px; }
    .auth-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .auth-card .form-group { margin-bottom: 16px; }
    .auth-card .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--primary); margin-bottom: 4px; }
    .auth-card .form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem; color: var(--black); background: var(--white); transition: var(--transition); outline: none; font-family: inherit; box-sizing: border-box; }
    .auth-card .form-group input:focus { border-color: var(--accent-red); box-shadow: 0 0 0 3px rgba(204,0,0,0.08); }
    .auth-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent-red), #990000); color: var(--white); border: none; border-radius: var(--radius-full); font-size: 1rem; font-weight: 700; cursor: pointer; transition: var(--transition); margin-top: 8px; }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(204,0,0,0.3); }
    .auth-footer-text { text-align: center; font-size: 0.85rem; color: var(--gray); margin-top: 20px; }
    .auth-footer-text a { color: var(--accent-red); font-weight: 600; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <img src="images/logo.jpg" alt="Rise & Run TT" class="logo-img"> Rise & Run TT
      </a>
      <button class="mobile-toggle" id="mobileToggle" aria-label="Menu"><i class="fas fa-bars"></i></button>
      <nav class="nav" id="mainNav">
        <a href="index.html">Home</a>
        <a href="events.html">Events & Results</a>
        <a href="login.html" id="navLogin">Login</a>
        <a href="signup.html" class="btn-primary" id="navSignup">Sign Up</a>
        <a href="dashboard.html" style="display:none;color:var(--accent);font-weight:700;" id="navDashboard">My Dashboard</a>
      </nav>
    </div>
  </header>

  <section class="auth-hero">
    <div class="container">
      <h1><span>Update</span> Password</h1>
      <p>Enter your new password below.</p>
    </div>
  </section>

  <section class="auth-section">
    <div class="auth-container">
      <form class="auth-card" id="updatePasswordForm">
        <div class="form-group">
          <label>New Password <span style="color:var(--accent-red);">*</span></label>
          <input type="password" id="password" placeholder="At least 6 characters" minlength="6" required>
        </div>
        <div class="form-group">
          <label>Confirm Password <span style="color:var(--accent-red);">*</span></label>
          <input type="password" id="confirmPassword" placeholder="Repeat your password" minlength="6" required>
        </div>
        <button class="auth-btn" id="updateBtn" type="submit"><i class="fas fa-save"></i> Update Password</button>
      </form>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script>
    (async function() {
      const { data, error } = await window.supabase.auth.getSession();
      if (!data?.session) {
        document.getElementById('updatePasswordForm').innerHTML = '<p style="color:var(--gray);text-align:center;">Invalid or expired reset link. <a href="forgot-password.html" style="color:var(--accent-red);font-weight:600;">Request a new one</a></p>';
        return;
      }
    })();

    document.getElementById('updatePasswordForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (pw !== confirm) { alert('Passwords do not match.'); return; }
      if (pw.length < 6) { alert('Password must be at least 6 characters.'); return; }
      const btn = document.getElementById('updateBtn');
      btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Updating...';
      btn.disabled = true;
      const { error } = await window.supabase.auth.updateUser({ password: pw });
      if (error) { alert('Error: ' + error.message); btn.innerHTML = '<i class="fas fa-save"></i> Update Password'; btn.disabled = false; return; }
      alert('Password updated successfully!');
      window.location.href = 'login.html';
    });
  </script>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand"><h3>Rise & Run TT</h3></div>
        <div class="footer-col">
          <h4>Quick Links</h4>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events & Results</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <span>&copy; 2026 Rise & Run TT. All rights reserved.</span>
        <div class="footer-social">
          <a href="https://www.instagram.com/riserun.tt/" target="_blank" rel="noopener" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
